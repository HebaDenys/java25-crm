server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: java25-crm
  datasource:
    url: ${CRM_DATABASE_URL:jdbc:postgresql://localhost:5432/java25_crm}
    username: ${CRM_DATABASE_USERNAME:crm}
    password: ${CRM_DATABASE_PASSWORD:crm}
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

crm:
  cors:
    allowed-origins: ${CRM_ALLOWED_ORIGINS:http://localhost:5173}